<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<title>Tracker</title>
<link rel="manifest" id="manifest-placeholder">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#242433;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0ff;--text2:#9898b8;--text3:#5a5a7a;
  --accent:#6c63ff;--accent2:#8b83ff;--accent-bg:rgba(108,99,255,0.12);--accent-border:rgba(108,99,255,0.35);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.1);--green-border:rgba(34,197,94,0.3);--green-text:#4ade80;
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);--red-border:rgba(239,68,68,0.3);--red-text:#f87171;
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,0.1);--yellow-border:rgba(245,158,11,0.3);--yellow-text:#fbbf24;
  --radius:14px;--r-sm:8px;--r-pill:100px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;overscroll-behavior:none;}

/* HEADER */
.header{padding:52px 20px 0;background:linear-gradient(180deg,#0f0f1a 0%,var(--bg) 100%);position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.app-badge{font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent2);background:var(--accent-bg);border:1px solid var(--accent-border);padding:3px 10px;border-radius:var(--r-pill);}
.header-title{font-size:26px;font-weight:900;letter-spacing:-0.03em;margin-top:10px;line-height:1;}
.header-title span{color:var(--accent2);}
.header-sub{font-size:12px;color:var(--text3);margin-top:4px;font-weight:500;}

/* TABS */
.tabs{display:flex;gap:0;margin-top:14px;border-bottom:1px solid var(--border);}
.tab{flex:1;text-align:center;padding:10px 0;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s;letter-spacing:0.02em;}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px 20px 0;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 10px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat.s-logged::before{background:var(--accent);}
.stat.s-present::before{background:var(--green);}
.stat.s-absent::before{background:var(--red);}
.stat.s-overall::before{background:var(--yellow);}
.stat-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);}
.stat-num{font-size:24px;font-weight:800;letter-spacing:-0.04em;margin-top:2px;color:var(--text);}
.stat-num.ok{color:var(--green-text);}
.stat-num.bad{color:var(--red-text);}

/* RING */
.ring-wrap{padding:20px 20px 0;display:flex;align-items:center;gap:16px;}
.ring-pct{font-size:32px;font-weight:900;letter-spacing:-0.04em;}
.ring-pct.ok{color:var(--green-text);}
.ring-pct.warn{color:var(--yellow-text);}
.ring-pct.bad{color:var(--red-text);}
.ring-label{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500;}
.ring-bar{margin-top:8px;height:4px;background:var(--surface3);border-radius:4px;width:140px;overflow:hidden;}
.ring-fill{height:100%;border-radius:4px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.ring-fill.ok{background:var(--green);}
.ring-fill.warn{background:var(--yellow);}
.ring-fill.bad{background:var(--red);}
.ring-req{font-size:10px;color:var(--text3);margin-top:4px;}

/* LEGEND */
.legend{display:flex;gap:10px;padding:12px 20px 0;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-weight:500;}
.leg-dot{width:8px;height:8px;border-radius:2px;}
.ld-p{background:var(--green);}
.ld-a{background:var(--red);}
.ld-e{background:var(--yellow);}
.ld-n{background:var(--surface3);}

/* WEEKS */
.weeks{padding:12px 20px 120px;display:flex;flex-direction:column;gap:10px;}
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.2s;}
.week-card.is-open{border-color:var(--accent-border);}
.week-hdr{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:12px;}
.week-num-badge{width:36px;height:36px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text2);flex-shrink:0;}
.week-card.is-open .week-num-badge{background:var(--accent-bg);color:var(--accent2);}
.week-hdr-info{flex:1;}
.week-hdr-title{font-size:14px;font-weight:700;}
.week-hdr-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.week-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-pill);border:1px solid;}
.wp-none{background:var(--surface2);border-color:var(--border2);color:var(--text3);}
.wp-good{background:var(--green-bg);border-color:var(--green-border);color:var(--green-text);}
.wp-warn{background:var(--yellow-bg);border-color:var(--yellow-border);color:var(--yellow-text);}
.wp-bad{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text);}
.week-chevron{font-size:16px;color:var(--text3);transition:transform 0.25s;flex-shrink:0;}
.week-chevron.open{transform:rotate(180deg);}
.week-progress{height:2px;background:var(--surface3);margin:0 16px 12px;}
.week-progress-fill{height:100%;border-radius:2px;transition:width 0.4s;}
.week-body{border-top:1px solid var(--border);}
.day-section{}
.day-lbl{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent2);padding:10px 16px 6px;background:var(--accent-bg);}
.class-row{display:flex;align-items:center;padding:10px 16px;gap:12px;border-top:1px solid var(--border);}
.class-row:first-of-type{border-top:none;}
.class-icon{width:34px;height:34px;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text3);flex-shrink:0;}
.class-info{flex:1;min-width:0;}
.class-code{font-size:13px;font-weight:700;}
.class-period-tag{display:inline-block;font-size:9px;font-weight:700;background:var(--surface3);color:var(--text3);padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle;letter-spacing:0.04em;}
.class-name{font-size:11px;color:var(--text3);margin-top:2px;}
.att-btn{min-width:86px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:11px;font-weight:700;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:5px;flex-shrink:0;transition:transform 0.1s;}
.att-btn:active{transform:scale(0.94);}
.att-btn.p{background:var(--green-bg);border-color:var(--green-border);color:var(--green-text);}
.att-btn.a{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text);}
.att-btn.e{background:var(--yellow-bg);border-color:var(--yellow-border);color:var(--yellow-text);}

/* SUBJECT SUMMARY */
.subj-list{padding:12px 20px 120px;display:flex;flex-direction:column;gap:10px;}
.subj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.subj-top{display:flex;align-items:center;gap:12px;padding:14px 16px 10px;}
.subj-icon{width:42px;height:42px;border-radius:11px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--text3);flex-shrink:0;}
.subj-title-wrap{flex:1;min-width:0;}
.subj-code{font-size:14px;font-weight:800;color:var(--text);}
.subj-name{font-size:11px;color:var(--text3);margin-top:2px;}
.subj-pct-big{font-size:26px;font-weight:900;letter-spacing:-0.04em;}
.subj-pct-big.ok{color:var(--green-text);}
.subj-pct-big.warn{color:var(--yellow-text);}
.subj-pct-big.bad{color:var(--red-text);}
.subj-pct-big.none{color:var(--text3);}
.subj-bar-wrap{padding:0 16px 12px;}
.subj-bar{height:5px;border-radius:4px;background:var(--surface3);overflow:hidden;}
.subj-bar-fill{height:100%;border-radius:4px;transition:width 0.5s;}
.subj-pills{display:flex;gap:6px;padding:0 16px 14px;flex-wrap:wrap;}
.subj-pill{display:flex;flex-direction:column;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;flex:1;min-width:60px;}
.sp-val{font-size:18px;font-weight:800;letter-spacing:-0.03em;}
.sp-val.ok{color:var(--green-text);}
.sp-val.bad{color:var(--red-text);}
.sp-val.warn{color:var(--yellow-text);}
.sp-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-top:2px;}
.subj-danger-note{margin:0 16px 14px;padding:8px 12px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--r-sm);font-size:11px;color:var(--red-text);font-weight:600;}
.subj-safe-note{margin:0 16px 14px;padding:8px 12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--r-sm);font-size:11px;color:var(--green-text);font-weight:600;}

/* FOOTER */
.footer{padding:8px 20px 16px;text-align:center;}
.footer-inner{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-pill);}
.footer-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.6;}
.footer-text{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.02em;}
.footer-name{color:var(--accent2);font-weight:800;letter-spacing:0.05em;}

/* INSTALL */
.install-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface2);border-top:1px solid var(--border2);padding:14px 20px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px;z-index:200;}
.install-text{flex:1;font-size:12px;color:var(--text2);}
.install-text strong{display:block;font-size:14px;font-weight:700;color:var(--text);}
.install-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.install-dismiss{background:none;border:none;color:var(--text3);font-size:24px;cursor:pointer;padding:0;line-height:1;}
.hidden{display:none!important;}
.page{display:none;}
.page.active{display:block;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="app-badge">RUET · Civil Engg.</span>
  </div>
  <div class="header-title">Track<span>er</span></div>
  <div class="header-sub">Section B &nbsp;·&nbsp; 2nd Year Odd Semester 2024</div>
  <div class="tabs">
    <div class="tab active" id="tab-weekly" onclick="switchTab('weekly')">Weekly</div>
    <div class="tab" id="tab-subjects" onclick="switchTab('subjects')">By Subject</div>
  </div>
</div>

<!-- WEEKLY PAGE -->
<div class="page active" id="page-weekly">
  <div class="stats">
    <div class="stat s-logged"><div class="stat-lbl">Logged</div><div class="stat-num" id="s-total">0</div></div>
    <div class="stat s-present"><div class="stat-lbl">Present</div><div class="stat-num ok" id="s-present">0</div></div>
    <div class="stat s-absent"><div class="stat-lbl">Absent</div><div class="stat-num bad" id="s-absent">0</div></div>
    <div class="stat s-overall"><div class="stat-lbl">Overall</div><div class="stat-num" id="s-pct-sm">—</div></div>
  </div>
  <div class="ring-wrap">
    <svg width="72" height="72" viewBox="0 0 72 72" style="flex-shrink:0">
      <circle cx="36" cy="36" r="28" fill="none" stroke="#1c1c26" stroke-width="8"/>
      <circle id="ring-circle" cx="36" cy="36" r="28" fill="none" stroke="#6c63ff" stroke-width="8"
        stroke-linecap="round" stroke-dasharray="175.9" stroke-dashoffset="175.9"
        transform="rotate(-90 36 36)" style="transition:stroke-dashoffset 0.6s,stroke 0.4s"/>
    </svg>
    <div>
      <div class="ring-pct" id="ring-pct">—</div>
      <div class="ring-label">overall attendance</div>
      <div class="ring-bar"><div class="ring-fill ok" id="ring-bar-fill" style="width:0%"></div></div>
      <div class="ring-req">Min. required: <strong>75%</strong></div>
    </div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot ld-p"></div>Present</div>
    <div class="leg"><div class="leg-dot ld-a"></div>Absent</div>
    <div class="leg"><div class="leg-dot ld-e"></div>Excused</div>
    <div class="leg"><div class="leg-dot ld-n"></div>Unmarked</div>
  </div>
  <div class="weeks" id="weeks-list"></div>
</div>

<!-- SUBJECTS PAGE -->
<div class="page" id="page-subjects">
  <div class="subj-list" id="subj-list"></div>
</div>

<div class="footer">
  <div class="footer-inner">
    <div class="footer-dot"></div>
    <div class="footer-text">coded bluntly by <span class="footer-name">JINX</span></div>
    <div class="footer-dot"></div>
  </div>
</div>

<div class="install-bar hidden" id="install-bar">
  <div class="install-text"><strong>Add to Home Screen</strong>Works offline, saves your data</div>
  <button class="install-btn" id="install-btn">Install</button>
  <button class="install-dismiss" id="install-dismiss">×</button>
</div>

<script>
const WEEKS=12;
const schedule=[
  {day:"Saturday",slots:[
    {code:"CE 2103",name:"Engg. Materials",teacher:"MSI",period:"P1"},
    {code:"Hum 2101",name:"Humanities",teacher:"MB",period:"P2"},
    {code:"Math 2101",name:"Mathematics III",teacher:"IAY",period:"P3"},
    {code:"CE 2122",name:"Fluid Lab",teacher:"HMR/BR/MDA",period:"P7–9"},
  ]},
  {day:"Sunday",slots:[
    {code:"CE 2110",name:"Surveying",teacher:"MRI",period:"P1–3"},
    {code:"CE 2103",name:"Engg. Materials",teacher:"MMS",period:"P4"},
    {code:"CE 2121",name:"Fluid Mechanics",teacher:"X",period:"P6"},
  ]},
  {day:"Monday",slots:[
    {code:"Math 2101",name:"Mathematics III",teacher:"IAY",period:"P1"},
    {code:"CE 2103",name:"Engg. Materials",teacher:"MSI",period:"P2"},
    {code:"CE 2121",name:"Fluid Mechanics",teacher:"BR",period:"P3"},
    {code:"CE 2104",name:"Concrete Lab",teacher:"MMS/MSI/X",period:"P4–6"},
  ]},
  {day:"Tuesday",slots:[
    {code:"Math 2101",name:"Mathematics III",teacher:"MHU",period:"P1"},
    {code:"Hum 2101",name:"Humanities",teacher:"NF",period:"P2"},
    {code:"CE 2121",name:"Fluid Mechanics",teacher:"BR",period:"P4"},
    {code:"CE 2103",name:"Engg. Materials",teacher:"MMS",period:"P5"},
    {code:"CE 2111",name:"Numerical Methods",teacher:"MKZ",period:"P7–8"},
  ]},
  {day:"Wednesday",slots:[
    {code:"CE 2121",name:"Fluid Mechanics",teacher:"X",period:"P4"},
    {code:"CE 2111",name:"Numerical Methods",teacher:"KJS",period:"P5"},
  ]},
];

// unique subjects in order
const subjects=[
  {code:"CE 2103",name:"Engineering Materials"},
  {code:"Hum 2101",name:"Humanities"},
  {code:"Math 2101",name:"Mathematics III"},
  {code:"CE 2122",name:"Fluid Lab"},
  {code:"CE 2110",name:"Surveying"},
  {code:"CE 2121",name:"Fluid Mechanics"},
  {code:"CE 2104",name:"Concrete Lab"},
  {code:"CE 2111",name:"Numerical Methods"},
];

const STORAGE_KEY='tracker_v4';
let state=loadState();
let openWeeks=new Set([0]);
let deferredPrompt=null;
let currentTab='weekly';

function loadState(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s){const p=JSON.parse(s);if(p.length===WEEKS&&p[0].length===schedule.length)return p;}
  }catch(e){}
  return Array.from({length:WEEKS},()=>schedule.map(d=>d.slots.map(()=>null)));
}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-weekly').classList.toggle('active',tab==='weekly');
  document.getElementById('tab-subjects').classList.toggle('active',tab==='subjects');
  document.getElementById('page-weekly').classList.toggle('active',tab==='weekly');
  document.getElementById('page-subjects').classList.toggle('active',tab==='subjects');
  if(tab==='subjects') renderSubjects();
}

function cycle(s){if(s===null)return'p';if(s==='p')return'a';if(s==='a')return'e';return null;}
function statusLabel(s){if(s==='p')return'✓  Present';if(s==='a')return'✗  Absent';if(s==='e')return'!  Excused';return'Mark';}

function weekStats(w){
  let total=0,present=0;
  state[w].forEach(day=>day.forEach(s=>{if(s){total++;if(s==='p')present++;}}));
  return{total,present};
}
function globalStats(){
  let total=0,present=0,absent=0;
  state.forEach(week=>week.forEach(day=>day.forEach(s=>{
    if(s){total++;if(s==='p')present++;if(s==='a')absent++;}
  })));
  return{total,present,absent};
}

function subjectStats(code){
  let total=0,present=0,absent=0,excused=0;
  for(let w=0;w<WEEKS;w++){
    schedule.forEach((dayObj,dIdx)=>{
      dayObj.slots.forEach((slot,sIdx)=>{
        if(slot.code===code){
          const s=state[w][dIdx][sIdx];
          if(s){total++;if(s==='p')present++;else if(s==='a')absent++;else if(s==='e')excused++;}
        }
      });
    });
  }
  return{total,present,absent,excused};
}

function pillClass(pct){if(pct===null)return'wp-none';if(pct>=75)return'wp-good';if(pct>=60)return'wp-warn';return'wp-bad';}
function pctClass(pct){if(pct===null)return'none';if(pct>=75)return'ok';if(pct>=60)return'warn';return'bad';}
function pfClass(pct){if(pct>=75)return'ok';if(pct>=60)return'warn';return'bad';}
function codeIcon(code){
  if(code.includes('Math'))return'∑';
  if(code.includes('Hum'))return'✦';
  if(code==='CE 2121'||code==='CE 2122')return'≋';
  if(code==='CE 2110')return'◎';
  if(code==='CE 2104')return'▦';
  if(code==='CE 2111')return'λ';
  return code.replace(/\D/g,'').slice(-2);
}

function renderSubjects(){
  const container=document.getElementById('subj-list');
  container.innerHTML='';
  subjects.forEach(subj=>{
    const{total,present,absent,excused}=subjectStats(subj.code);
    const pct=total>0?Math.round(present/total*100):null;
    const pc=pctClass(pct);

    // how many more classes can be missed and still stay at 75%
    let canMiss=null,needMore=null;
    if(total>0){
      // classes needed to maintain 75%: ceil(0.75 * totalHeld) - present
      // can miss: floor(present/0.75) - total  (assuming all future unmarked are held)
      const maxMissable=Math.floor(present/0.75)-total;
      canMiss=Math.max(0,maxMissable);
      if(pct<75){
        // need: ceil(0.75*total) - present  (just to catch up with current total)
        needMore=Math.ceil(0.75*total)-present;
      }
    }

    const card=document.createElement('div');
    card.className='subj-card';
    card.innerHTML=`
      <div class="subj-top">
        <div class="subj-icon">${codeIcon(subj.code)}</div>
        <div class="subj-title-wrap">
          <div class="subj-code">${subj.code}</div>
          <div class="subj-name">${subj.name}</div>
        </div>
        <div class="subj-pct-big ${pc}">${pct!==null?pct+'%':'—'}</div>
      </div>
      <div class="subj-bar-wrap">
        <div class="subj-bar">
          <div class="subj-bar-fill ring-fill ${pc!=='none'?pfClass(pct):''}" style="width:${pct||0}%;background:${pct===null?'var(--surface3)':pct>=75?'var(--green)':pct>=60?'var(--yellow)':'var(--red)'}"></div>
        </div>
      </div>
      <div class="subj-pills">
        <div class="subj-pill"><div class="sp-val">${total}</div><div class="sp-lbl">Total</div></div>
        <div class="subj-pill"><div class="sp-val ok">${present}</div><div class="sp-lbl">Present</div></div>
        <div class="subj-pill"><div class="sp-val bad">${absent}</div><div class="sp-lbl">Absent</div></div>
        <div class="subj-pill"><div class="sp-val warn">${excused}</div><div class="sp-lbl">Excused</div></div>
      </div>
      ${total>0&&pct>=75?`<div class="subj-safe-note">✓ Safe — you can miss ${canMiss} more class${canMiss!==1?'es':''} and stay above 75%</div>`:''}
      ${total>0&&pct<75?`<div class="subj-danger-note">⚠ Need ${needMore} more attendance${needMore!==1?'s':''} to reach 75% in current classes</div>`:''}
    `;
    container.appendChild(card);
  });
}

function render(){
  const container=document.getElementById('weeks-list');
  container.innerHTML='';
  for(let w=0;w<WEEKS;w++){
    const isOpen=openWeeks.has(w);
    const{total,present}=weekStats(w);
    const pct=total>0?Math.round(present/total*100):null;

    const block=document.createElement('div');
    block.className='week-card'+(isOpen?' is-open':'');

    const hdr=document.createElement('div');
    hdr.className='week-hdr';
    hdr.innerHTML=`<div class="week-num-badge">${w+1}</div>
      <div class="week-hdr-info">
        <div class="week-hdr-title">Week ${w+1}</div>
        <div class="week-hdr-sub">${total>0?present+' of '+total+' attended':'No data yet'}</div>
      </div>
      <span class="week-pill ${pillClass(pct)}">${pct!==null?pct+'%':'—'}</span>
      <span class="week-chevron${isOpen?' open':''}">⌄</span>`;
    hdr.addEventListener('click',()=>{
      if(openWeeks.has(w))openWeeks.delete(w);else openWeeks.add(w);
      render();
    });
    block.appendChild(hdr);

    if(pct!==null){
      const pb=document.createElement('div');
      pb.className='week-progress';
      pb.innerHTML=`<div class="week-progress-fill ring-fill ${pfClass(pct)}" style="width:${pct}%"></div>`;
      block.appendChild(pb);
    }

    if(isOpen){
      const body=document.createElement('div');
      body.className='week-body';
      schedule.forEach((dayObj,dIdx)=>{
        const sec=document.createElement('div');
        sec.className='day-section';
        const lbl=document.createElement('div');
        lbl.className='day-lbl';
        lbl.textContent=dayObj.day;
        sec.appendChild(lbl);
        dayObj.slots.forEach((slot,sIdx)=>{
          const row=document.createElement('div');
          row.className='class-row';
          const s=state[w][dIdx][sIdx];
          row.innerHTML=`<div class="class-icon">${codeIcon(slot.code)}</div>
            <div class="class-info">
              <div class="class-code">${slot.code}<span class="class-period-tag">${slot.period}</span></div>
              <div class="class-name">${slot.name} · ${slot.teacher}</div>
            </div>`;
          const btn=document.createElement('button');
          btn.className='att-btn'+(s?' '+s:'');
          btn.textContent=statusLabel(s);
          btn.addEventListener('click',e=>{
            e.stopPropagation();
            state[w][dIdx][sIdx]=cycle(state[w][dIdx][sIdx]);
            saveState();render();updateStats();
            if(currentTab==='subjects')renderSubjects();
          });
          row.appendChild(btn);
          sec.appendChild(row);
        });
        body.appendChild(sec);
      });
      block.appendChild(body);
    }
    container.appendChild(block);
  }
  updateStats();
}

function updateStats(){
  const{total,present,absent}=globalStats();
  const pct=total>0?Math.round(present/total*100):null;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-present').textContent=present;
  document.getElementById('s-absent').textContent=absent;
  const sm=document.getElementById('s-pct-sm');
  sm.textContent=pct!==null?pct+'%':'—';
  sm.className='stat-num'+(pct===null?'':pct>=75?' ok':' bad');
  const ring=document.getElementById('ring-circle');
  const rp=document.getElementById('ring-pct');
  const rb=document.getElementById('ring-bar-fill');
  const C=175.9;
  if(pct!==null){
    ring.style.strokeDashoffset=C-(pct/100*C);
    ring.style.stroke=pct>=75?'#22c55e':pct>=60?'#f59e0b':'#ef4444';
    rp.textContent=pct+'%';
    rp.className='ring-pct '+(pct>=75?'ok':pct>=60?'warn':'bad');
    rb.style.width=pct+'%';
    rb.className='ring-fill '+(pct>=75?'ok':pct>=60?'warn':'bad');
  } else {
    ring.style.strokeDashoffset=C;
    ring.style.stroke='#6c63ff';
    rp.textContent='—';
    rp.className='ring-pct';
    rb.style.width='0%';
  }
}

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-bar').classList.remove('hidden');
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();await deferredPrompt.userChoice;
  deferredPrompt=null;document.getElementById('install-bar').classList.add('hidden');
});
document.getElementById('install-dismiss').addEventListener('click',()=>{
  document.getElementById('install-bar').classList.add('hidden');
});

const manifest={name:"Tracker",short_name:"Tracker",start_url:".",display:"standalone",background_color:"#0a0a0f",theme_color:"#0a0a0f",
  icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236c63ff'/%3E%3Ctext y='.85em' font-size='62' x='18' fill='white' font-weight='900' font-family='system-ui'%3ET%3C/text%3E%3C/svg%3E",sizes:"any",type:"image/svg+xml"}]};
const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
document.getElementById('manifest-placeholder').href=URL.createObjectURL(blob);

if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

render();
</script>
</body>
</html>
